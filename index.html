<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanuvis.com</title>
<link rel="icon" href="SiteICON.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0a0a0d;
    --ink-2: #131319;
    --parchment: #e4c9c9;
    --parchment-dim: #8f8080;
    --ember: #d82a2a;
    --ember-dim: #a9212166;
    --teal: #3f6c6b;
    --line: #22232d;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:var(--ink);
    color:var(--parchment);
    font-family:'Space Grotesk', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:64px 20px 80px;
    position:relative;
    overflow-x:hidden;
  }

  .ink-glow{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(600px 400px at 15% 10%, rgba(216, 42, 42, 0.07), transparent 60%),
      radial-gradient(500px 500px at 85% 85%, rgba(63,108,107,0.09), transparent 60%);
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift{
    0%{ transform: translateY(0px) scale(1); }
    100%{ transform: translateY(20px) scale(1.05); }
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    max-width:480px;
  }

  .avatar{
    width:250px;
    height:250px;
    margin:0 auto 22px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .avatar img{
    width:100%;
    height:100%;
    object-fit:contain;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:32px;
    text-align:center;
    margin:0 0 6px;
    letter-spacing:0.2px;
    color:var(--parchment);
  }

  .tagline{
    text-align:center;
    color:var(--parchment-dim);
    font-size:14.5px;
    margin:0 0 40px;
    letter-spacing:0.3px;
  }

  .tagline .cursor{
    display:inline-block;
    width:1px;
    height:14px;
    background:var(--ember);
    margin-left:2px;
    vertical-align:middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:10px;
    margin:36px 0 14px;
    color:var(--parchment-dim);
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .eyebrow::before, .eyebrow::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:16px 20px;
    border-radius:12px;
    text-decoration:none;
    color:var(--parchment);
    background:var(--ink-2);
    border:1px solid var(--line);
    font-size:15.5px;
    font-weight:500;
    transition: transform .18s ease, border-color .18s ease, background .18s ease;
    overflow:hidden;
  }

  .btn:hover{
    transform: translateY(-2px);
    border-color:#33354a;
    background:#181b26;
  }

  .btn:active{ transform: translateY(0); }

  .btn .icon{
    width:22px;
    height:22px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .btn .icon svg{ width:100%; height:100%; }

  .btn .label{ flex:1; }

  .btn .arrow{
    color:var(--parchment-dim);
    font-size:16px;
    transition: transform .18s ease;
  }
  .btn:hover .arrow{ transform: translateX(3px); color:var(--parchment); }

  .btn.featured{
    background: linear-gradient(120deg, #d82a2a, #9c1313);
    border-color: transparent;
    color:#120c05;
    font-weight:600;
    box-shadow: 0 14px 30px -14px rgba(216, 42, 42, 0.4);
  }
  .btn.featured .arrow{ color:#120505; opacity:0.7; }
  .btn.featured::before{
    content:'Ultimo vídeo';
    position:absolute;
    top:8px;
    right:14px;
    font-size:9.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-weight:600;
    opacity:0.65;
  }
  .btn.featured:hover{ transform: translateY(-2px) scale(1.008); }

  .btn:not(.featured)::after{
    content:'';
    position:absolute;
    top:0;
    right:0;
    width:0;
    height:0;
    border-style:solid;
    border-width:0 0 0 0;
    border-color: transparent transparent var(--ember) transparent;
    transition: border-width .18s ease;
  }
  .btn:not(.featured):hover::after{
    border-width:0 0 16px 16px;
  }

  .socials{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:30px;
  }

  .social{
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--ink-2);
    border:1px solid var(--line);
    color:var(--parchment-dim);
    transition: transform .18s ease, color .18s ease, border-color .18s ease;
  }
  .social svg{ width:19px; height:19px; }
  .social:hover{
    transform: translateY(-3px);
    color:var(--ember);
    border-color:#33354a;
  }

  footer{
    text-align:center;
    margin-top:48px;
    font-size:12px;
    color:#4b4e5c;
    letter-spacing:0.3px;
  }

  @media (max-width:400px){
    h1{ font-size:27px; }
    .btn{ padding:14px 16px; font-size:14.5px; }
  }

  :focus-visible{
    outline:2px solid var(--ember);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .ink-glow{ animation:none; }
    .tagline .cursor{ animation:none; }
  }
</style>
</head>
<body>
